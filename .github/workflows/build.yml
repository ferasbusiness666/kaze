name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Caches ~/.gradle so dependency downloads are reused between runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The hosted runner ships the Android SDK; make sure the exact platform/build-tools
      # this project targets are present (no-op if already installed).
      - name: Ensure SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null 2>&1 || true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kaze-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
